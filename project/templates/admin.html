<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateEd - Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <h1><a href="/home" style="text-decoration:none;color:inherit">Rate<span>Ed</span></a></h1>
        <div class="header-right">
            <span class="points-badge" id="points-badge" title="Contribution Points"></span>
            <span id="username"></span>
            <button class="btn btn-outline btn-small" id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="container">
        <a href="/home" class="back-link">&larr; Back</a>
        <h2 style="color:#2563EB;margin-bottom:1.5rem">Admin Dashboard</h2>
        <div class="admin-page-tabs">
            <button class="admin-page-tab active" data-tab="users">Users</button>
            <button class="admin-page-tab" data-tab="verifications">Verifications</button>
            <button class="admin-page-tab" data-tab="bans">Bans</button>
        </div>
        <div id="admin-tab-users" class="admin-tab-panel">
            <div class="admin-card"><h3>All Users</h3><div id="admin-users-list"></div></div>
        </div>
        <div id="admin-tab-verifications" class="admin-tab-panel" style="display:none">
            <div class="admin-card"><h3>Pending Verification Requests</h3><div id="admin-verifications-list"></div></div>
        </div>
        <div id="admin-tab-bans" class="admin-tab-panel" style="display:none">
            <div class="admin-card"><h3>Banned Users</h3><div id="admin-bans-list"></div></div>
        </div>
        <div id="activity-modal" class="modal" style="display:none">
            <div class="modal-content">
                <button class="modal-close" id="close-activity-modal">&times;</button>
                <h3 id="activity-modal-title"></h3>
                <div id="activity-modal-content"></div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
