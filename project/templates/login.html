<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateEd - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Rate<span>Ed</span></h1>
            <p class="subtitle">Rate and discuss educational institutions.</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="login-tab">Login</button>
                <button class="auth-tab" id="register-tab">Register</button>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-user">Username</label>
                    <input type="text" id="login-user" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-pass">Password</label>
                    <input type="password" id="login-pass" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <form id="register-form" style="display:none">
                <div class="form-group">
                    <label for="reg-user">Username</label>
                    <input type="text" id="reg-user" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reg-pass">Password</label>
                    <input type="password" id="reg-pass" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>

            <p class="error-msg" id="auth-error"></p>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
