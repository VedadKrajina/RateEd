<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Educational Institutions - RateEd</title>
    <meta name="description" content="Browse and search schools and universities on RateEd. Filter by city, type, ratings, and tuition. Find the right institution for you.">
    <link rel="canonical" href="https://rateed.org/home">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rateed.org/home">
    <meta property="og:title" content="Browse Institutions - RateEd">
    <meta property="og:description" content="Browse and search educational institutions on RateEd. Filter by city, type, and ratings.">
    <meta property="og:site_name" content="RateEd">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <h1>Rate<span>Ed</span></h1>
        <div class="header-right">
            <button class="lang-toggle" id="lang-toggle">BS</button>
            <span class="points-badge" id="points-badge" title="Contribution Points"></span>
            <span id="username"></span>
            <button class="btn btn-outline btn-small" id="logout-btn">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="page-layout">
            <div class="main-content">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search institutions..." data-i18n-placeholder="searchPlaceholder">
                    <button class="btn btn-accent" id="search-btn" data-i18n="search">Search</button>
                </div>

                <div class="filter-panel">
                    <div class="filter-row">
                        <input type="text" id="filter-city" placeholder="City..." class="filter-input">
                        <select id="filter-ownership" class="filter-input">
                            <option value="">Public &amp; Private</option>
                            <option value="public">Public</option>
                            <option value="private">Private</option>
                        </select>
                        <input type="text" id="filter-programs" placeholder="Field (IT, Medicine, Law...)" class="filter-input">
                    </div>
                    <div class="filter-row">
                        <select id="filter-rating" class="filter-input">
                            <option value="">Any Rating</option>
                            <option value="3">3+ Stars</option>
                            <option value="4">4+ Stars</option>
                            <option value="5">5 Stars</option>
                        </select>
                        <input type="number" id="filter-tuition-min" placeholder="Tuition min ($)" class="filter-input" min="0">
                        <input type="number" id="filter-tuition-max" placeholder="Tuition max ($)" class="filter-input" min="0">
                        <button class="btn btn-accent btn-small" id="filter-btn" data-i18n="filter">Filter</button>
                        <button class="btn btn-small" id="filter-clear-btn" style="background:#E5E7EB;color:#555" data-i18n="clear">Clear</button>
                    </div>
                </div>

                <div class="create-section" id="create-section">
                    <h3>Add a New Institution</h3>
                    <div class="create-form">
                        <input type="text" id="create-input" placeholder="Institution name...">
                        <select id="create-type">
                            <option value="">Type...</option>
                            <option value="university">University</option>
                            <option value="highschool">High School</option>
                            <option value="school">School</option>
                            <option value="other">Other</option>
                        </select>
                        <button class="btn btn-accent" id="create-btn">Add</button>
                    </div>
                    <input type="text" id="create-description" placeholder="Brief description (optional)..." style="width:100%;margin-top:0.5rem;padding:0.6rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;">
                    <div style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap">
                        <input type="text" id="create-city" placeholder="City (optional)" style="flex:1;min-width:120px;padding:0.6rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;">
                        <select id="create-ownership" style="padding:0.6rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;background:#fff">
                            <option value="">Ownership...</option>
                            <option value="public">Public</option>
                            <option value="private">Private</option>
                        </select>
                        <input type="number" id="create-tuition-min" placeholder="Tuition min ($)" style="width:130px;padding:0.6rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;" min="0">
                        <input type="number" id="create-tuition-max" placeholder="Tuition max ($)" style="width:130px;padding:0.6rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;" min="0">
                    </div>
                    <input type="text" id="create-email-domain" placeholder="Email domain for verification (e.g. @mit.edu)" style="width:100%;margin-top:0.5rem;padding:0.6rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:1rem;">
                    <p class="error-msg" id="create-error"></p>
                </div>

                <div id="create-locked" class="create-locked" style="display:none">
                    <p>Earn <strong id="points-needed"></strong> contribution points to add new institutions. Rate institutions and join discussions to earn points!</p>
                </div>

                <div id="institutions-list">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-card">
                    <h3 data-i18n="topSchools">Top Schools</h3>
                    <select class="filter-select" id="school-type-filter">
                        <option value="">All Types</option>
                        <option value="university">University</option>
                        <option value="highschool">High School</option>
                        <option value="school">School</option>
                        <option value="other">Other</option>
                    </select>
                    <div id="school-rankings-list">
                        <div class="empty-state" style="padding:1rem;font-size:0.9rem">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
